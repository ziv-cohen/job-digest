# ============================================================
# Job Digest Pipeline — Configuration
# ============================================================
# Copy this file to config.local.yaml and fill in your API keys.
# config.local.yaml is gitignored and never committed.
# ============================================================

# --- API Keys (get free keys from each provider) ---
api_keys:
  jsearch_rapidapi_key: "YOUR_RAPIDAPI_KEY"       # https://rapidapi.com/letscrape-6bRBa3QguO5/api/jsearch
  adzuna_app_id: "YOUR_ADZUNA_APP_ID"              # https://developer.adzuna.com/
  adzuna_app_key: "YOUR_ADZUNA_APP_KEY"
  # Remotive: no key needed (public API)
  # StartupJobs.cz: scraped via public listings, no key needed

# --- Telegram settings (preferred output) ---
telegram:
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"   # from @BotFather
  chat_id: "YOUR_TELEGRAM_CHAT_ID"       # from api.telegram.org/bot<token>/getUpdates

# --- Email settings (fallback if Telegram not configured) ---
email:
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  sender_email: "your-email@gmail.com"
  sender_password: "your-gmail-app-password"        # https://myaccount.google.com/apppasswords
  recipient_email: "your-email@gmail.com"

# --- Search criteria ---
search:
  # Role titles to search for (each becomes a separate query)
  role_titles:
    - "engineering director"
    - "senior engineering manager"
    - "engineering manager"
    - "director of engineering"
    - "VP engineering"
    - "head of engineering"
    - "founding CTO"
    - "co-founder CTO"

  # Location targets (searched in combination with role titles)
  locations:
    primary_city: "Prague"
    country: "Czech Republic"
    region: "EMEA"

  # Max job age in days — older jobs are discarded entirely
  max_age_days: 7

# --- Anthropic / LLM settings ---
anthropic:
  api_key: "YOUR_ANTHROPIC_KEY"
  model: "claude-haiku-4-5-20251001"

# --- Profile matcher ---
profile_matcher:
  profile_summary: "YOUR_PROFILE_SUMMARY"  # set via PROFILE_SUMMARY env var
  cache_path: "profile_match_cache.json"   # override to /data/... on Railway
  fallback_score: 50                       # score used when API is unavailable (neutral mid-point)

# --- Scoring weights (total = 100 points max) ---
scoring:
  # Category weights — must sum to 100.
  # profile_match defaults to 0 until pipeline/profile_matcher.py is wired in.
  weights:
    profile_match: 45
    title: 15
    location: 15
    company_type: 10
    seniority: 5
    freshness: 5
    conditions: 5           # freelancer-friendly, salary disclosed, growth signals

  # All category values are direct scores (0–100).
  # Scores > 100 in conditions are capped at 100.

  title_match:
    founding_cto: 100      # Founding / co-founder CTO
    exact_cto: 90          # Standalone CTO (established company)
    exact_vp: 100          # VP Engineering
    exact_director: 100
    exact_senior_em: 85
    exact_em: 60           # boosted by em_growth_boost if company shows growth signals
    em_growth_boost: 15
    partial_match: 35

  location_fit:
    prague_onsite_hybrid: 100
    emea_remote: 100       # same as Prague — higher salaries compensate
    worldwide_remote: 90   # remote but region unspecified — slight discount for uncertainty
    czech_remote: 80       # Czech salaries are lower than West Europe, so for remote - Czech is in lower priority
    commute_2hr: 50
    commute_4hr: 25
    generic_remote: 40     # API-tagged remote but no region info at all
    unclear_or_other: 0    # unknown location — no points awarded

  company_type:
    product_company: 100
    outsourcing: 75
    consulting: 40
    unknown: 0             # unknown company type — no points awarded

  seniority:
    cto_level: 100
    vp_level: 100
    director_level: 100
    senior_manager: 80
    manager: 55
    unclear: 0             # unclear seniority — no points awarded

  freshness:
    today: 100
    yesterday: 70
    two_to_three_days: 40
    four_to_seven_days: 20

  conditions:
    freelancer_friendly: 40  # "freelance", "contractor", "B2B", "IČO"
    salary_mentioned: 25     # any salary info disclosed
    growth_signals: 35       # "series A/B/C", "fast-growing", "scaling", "hypergrowth"

  # Minimum score to include in digest (out of 100)
  min_score: 40

  # Minimum annual salary — jobs with disclosed salary below this are hard-filtered.
  # Jobs with no salary info are always kept. Amounts are rounded approximations of 2.4M CZK.
  min_salary:
    CZK: 2400000
    EUR: 95000
    USD: 100000
    GBP: 80000
    PLN: 400000

# --- Output ---
output:
  max_jobs_in_digest: 0    # 0 = no limit, include all that pass min_score
  sort_by: "score_desc"    # always descending by score
  timezone: "Europe/Prague"  # IANA timezone for digest timestamps (override via DIGEST_TIMEZONE env var)

# --- Schedule ---
schedule:
  cron: "0 8 * * *"        # 8:00 AM Prague time daily
  timezone: "Europe/Prague"
